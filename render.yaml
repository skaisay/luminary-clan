services:
  - type: web
    name: luminary-clan
    runtime: node
    buildCommand: apt-get update && apt-get install -y ffmpeg python3-pip || true && pip3 install --break-system-packages yt-dlp || true && npm install --include=dev && npx drizzle-kit push --force || true && npm run build
    startCommand: npm run start
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: CALLBACK_URL
        sync: false
